<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빛의 반사와 간섭 시뮬레이션 통합본</title>
    <style>
        /* ---------------------------------------------------
           전체 공통 및 탭 네비게이션 스타일 
           --------------------------------------------------- */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            background-color: #f8f9fa;
            color: #333;
        }

        #tab-nav {
            width: 100%;
            background-color: #222;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #444;
            color: #aaa;
            font-family: inherit;
            transition: 0.3s;
        }

        .tab-btn:hover { background-color: #555; color: #fff; }
        .tab-btn#btn-tab1.active { background-color: #1a73e8; color: #fff; }
        .tab-btn#btn-tab2.active { background-color: #4fc3f7; color: #000; }

        /* ---------------------------------------------------
           시뮬레이션 1 (방사형 구면파) 원본 CSS
           --------------------------------------------------- */
        #sim1-wrapper { display: flex; justify-content: center; width: 100%; padding-bottom: 20px; }
        #sim1-wrapper .app-container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 900px; max-width: 95vw; }
        #sim1-wrapper header { text-align: center; margin-bottom: 25px; }
        #sim1-wrapper h1 { margin: 0; font-size: 24px; color: #1a73e8; }
        #sim1-wrapper p.subtitle { margin: 5px 0 0; color: #666; font-size: 14px; }
        #sim1-wrapper canvas { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; width: 100%; height: 500px; display: block; }
        #sim1-wrapper .controls { margin-top: 25px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        #sim1-wrapper .control-item { display: flex; flex-direction: column; gap: 10px; }
        #sim1-wrapper .control-item label { font-weight: 600; font-size: 14px; color: #444; display: flex; justify-content: space-between; }
        #sim1-wrapper .control-item label span { color: #1a73e8; }
        #sim1-wrapper input[type="range"] { width: 100%; cursor: pointer; }
        #sim1-wrapper .mode-selector { grid-column: span 3; display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        #sim1-wrapper .btn { padding: 10px 20px; border: 2px solid #e0e0e0; border-radius: 8px; background: white; cursor: pointer; font-weight: 600; transition: all 0.2s; color: #555; }
        #sim1-wrapper .btn:hover { border-color: #1a73e8; color: #1a73e8; }
        #sim1-wrapper .btn.active { background: #1a73e8; border-color: #1a73e8; color: white; }
        #sim1-wrapper .info-box { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; font-size: 13px; line-height: 1.6; color: #1967d2; }

        /* ---------------------------------------------------
           시뮬레이션 2 (S자 파동 간섭) 원본 CSS
           --------------------------------------------------- */
        #sim2-wrapper { display: flex; justify-content: center; width: 100%; padding-bottom: 20px; }
        #sim2-wrapper .app-container { background: #1a1a1a; padding: 25px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 1000px; max-width: 95vw; color: #eee; }
        #sim2-wrapper header { text-align: center; margin-bottom: 20px; }
        #sim2-wrapper h1 { margin: 0; font-size: 24px; color: #4fc3f7; }
        #sim2-wrapper p.subtitle { margin: 8px 0 0; color: #aaa; font-size: 14.5px; line-height: 1.5; }
        #sim2-wrapper canvas { background: #000000; border: 1px solid #333; border-radius: 8px; width: 100%; height: 500px; display: block; }
        #sim2-wrapper .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        #sim2-wrapper .control-item { display: flex; flex-direction: column; gap: 8px; }
        #sim2-wrapper label { font-size: 13px; color: #bbb; font-weight: bold; }
        #sim2-wrapper input[type="range"] { width: 100%; cursor: pointer; }
        #sim2-wrapper .btn-group { grid-column: span 3; display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        #sim2-wrapper .btn { padding: 10px 20px; border: none; border-radius: 6px; background: #333; color: #eee; cursor: pointer; font-weight: 600; transition: 0.2s; }
        #sim2-wrapper .btn:hover { background: #444; }
        #sim2-wrapper .btn.active { background: #4fc3f7; color: #000; }
        #sim2-wrapper .legend-bar { display: flex; justify-content: center; gap: 20px; background: #111; padding: 10px; border-radius: 6px; margin-bottom: -10px; margin-top: 10px; font-size: 14px; border: 1px solid #333; }
        #sim2-wrapper .legend-item { display: flex; align-items: center; gap: 6px; }
        #sim2-wrapper .color-box { width: 14px; height: 14px; border-radius: 3px; }
        #sim2-wrapper .color-red { background: #ff4444; }
        #sim2-wrapper .color-blue { background: #4499ff; }
    </style>
</head>
<body onload="switchTab(1)">

    <div id="tab-nav">
        <button id="btn-tab1" class="tab-btn active" onclick="switchTab(1)">반사의 법칙</button>
        <button id="btn-tab2" class="tab-btn" onclick="switchTab(2)">입사각과 반사각이 왜 같을까</button>
    </div>

    <div id="sim1-wrapper">
        <div class="app-container">
            <header>
                <h1>반사의 법칙: 입사각과 반사각</h1>
                <p class="subtitle">퍼져나가는 빛이 반사의 법칙을 따르는 이유</p>
            </header>

            <canvas id="reflectionCanvas"></canvas>

            <div class="controls">
                <div class="control-item">
                    <label>입사각 (θ) <span id="angleValue">45°</span></label>
                    <input type="range" id="angleSlider" min="10" max="80" value="45">
                </div>
                <div class="control-item">
                    <label>파동 속도 <span id="speedValue1">5</span></label>
                    <input type="range" id="speedSlider1" min="1" max="15" value="5">
                </div>
                <div class="control-item">
                    <label>파동 빈도 <span id="freqValue">5</span></label>
                    <input type="range" id="freqSlider" min="1" max="15" value="5">
                </div>

                <div class="mode-selector">
                    <button class="btn" data-mode="ray">광선 모드</button>
                    <button class="btn" data-mode="wave">파동 모드</button>
                    <button class="btn active" data-mode="both">모두 보기</button>
                </div>
            </div>

            <div class="info-box">
                💡 <b>물리적 비밀:</b> 반사되어 나가는 파란색 둥근 물결을 뒤로 쭉 이어서 상상해 보세요. 마치 <b>거울 뒷면에 똑같은 빛이 하나 더 있는 것(가상 광원, 허상)</b>처럼 보이지 않나요?
            </div>
        </div>
    </div>

    <div id="sim2-wrapper" style="display:none;">
        <div class="app-container">
            <header>
                <h1>입사각과 반사각이 같아지는 이유</h1>
                <p class="subtitle">
                    <b>입사각과 반사각</b>이 <b>다른</b>경로는 서로 상쇄?!
                </p>
            </header>

            <div class="legend-bar">
                <div class="legend-item"><div class="color-box color-red"></div> 붉은색(+) : 파동의 마루</div>
                <div class="legend-item"><div class="color-box color-blue"></div> 푸른색(-) : 파동의 골</div>
                <div class="legend-item" style="color:#aaa; margin-left: 10px;">※ 서로 엇갈려 겹치면 상쇄되어 빛이 소멸합니다.</div>
            </div>

            <canvas id="simCanvas" style="margin-top: 20px;"></canvas>

            <div class="controls">
                <div class="control-item">
                    <label>파장 (물결의 길이)</label>
                    <input type="range" id="waveSlider" min="20" max="60" value="40">
                </div>
                <div class="control-item">
                    <label>파동 이동 속도</label>
                    <input type="range" id="speedSlider2" min="1" max="10" value="5">
                </div>
                <div class="control-item">
                    <label>거울 차단막 너비 (가운데 가림막 조절)</label>
                    <input type="range" id="maskWidthSlider" min="50" max="400" value="150">
                </div>

                <div class="btn-group">
                    <button class="btn active" data-mode="all">거울 전체 열기 (정상 반사)</button>
                    <button class="btn" data-mode="center_only">중앙만 열기 (강한 보강!)</button>
                    <button class="btn" data-mode="edges_only">중앙 가리기 (미세한 상쇄 파동!)</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // ---------------------------------------------------
    // 탭 이동 및 글로벌 관리 로직
    // ---------------------------------------------------
    let currentTab = 1;

    function switchTab(tabId) {
        currentTab = tabId;
        if (tabId === 1) {
            document.getElementById('sim1-wrapper').style.display = 'flex';
            document.getElementById('sim2-wrapper').style.display = 'none';
            document.getElementById('btn-tab1').classList.add('active');
            document.getElementById('btn-tab2').classList.remove('active');
            document.body.style.backgroundColor = '#f8f9fa';
            document.body.style.color = '#333';
        } else {
            document.getElementById('sim1-wrapper').style.display = 'none';
            document.getElementById('sim2-wrapper').style.display = 'flex';
            document.getElementById('btn-tab1').classList.remove('active');
            document.getElementById('btn-tab2').classList.add('active');
            document.body.style.backgroundColor = '#0f0f0f';
            document.body.style.color = '#eee';
        }
        // 탭이 바뀔 때마다 캔버스 크기를 다시 맞추도록 이벤트 발생
        setTimeout(() => window.dispatchEvent(new Event('resize')), 10);
    }

    // ===================================================
    // 시뮬레이션 1 JS (변수 충돌 방지를 위해 함수로 감쌈)
    // ===================================================
    function initSim1() {
        const canvas = document.getElementById('reflectionCanvas');
        const ctx = canvas.getContext('2d');
        const angleSlider = document.getElementById('angleSlider');
        const speedSlider = document.getElementById('speedSlider1');
        const freqSlider = document.getElementById('freqSlider');
        const modeButtons = document.querySelectorAll('#sim1-wrapper .btn');

        const angleLabel = document.getElementById('angleValue');
        const speedLabel = document.getElementById('speedValue1');
        const freqLabel = document.getElementById('freqValue');

        let mode = 'both';
        let time = 0;

        function resize() {
            if(currentTab !== 1) return;
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize);
        resize();

        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                mode = btn.dataset.mode;
            });
        });

        function draw() {
            // 다른 탭에 있을 때는 연산을 멈추어 컴퓨터 자원 절약
            if(currentTab !== 1) { requestAnimationFrame(draw); return; }

            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;
            
            ctx.clearRect(0, 0, width, height);

            const angle = parseInt(angleSlider.value);
            const speed = parseInt(speedSlider.value);
            const freq = parseInt(freqSlider.value);
            
            angleLabel.textContent = angle + '°';
            speedLabel.textContent = speed;
            freqLabel.textContent = freq;

            const centerX = width / 2;
            const centerY = height - 80;
            const rayLen = 400; 
            const rad = (angle * Math.PI) / 180;

            ctx.lineWidth = 6;
            ctx.strokeStyle = '#37474f';
            ctx.beginPath();
            ctx.moveTo(50, centerY);
            ctx.lineTo(width - 50, centerY);
            ctx.stroke();
            
            ctx.lineWidth = 1;
            for(let x = 60; x < width - 50; x += 15) {
                ctx.beginPath();
                ctx.moveTo(x, centerY);
                ctx.lineTo(x - 8, centerY + 12);
                ctx.stroke();
            }

            ctx.setLineDash([8, 8]);
            ctx.strokeStyle = '#bbb';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX, 50);
            ctx.stroke();
            ctx.setLineDash([]);

            const sourceX = centerX - Math.sin(rad) * rayLen;
            const sourceY = centerY - Math.cos(rad) * rayLen;

            if (mode === 'ray' || mode === 'both') {
                const outX = centerX + Math.sin(rad) * rayLen;
                const outY = centerY - Math.cos(rad) * rayLen;
                
                ctx.strokeStyle = '#f44336';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(sourceX, sourceY);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();

                ctx.strokeStyle = '#2196f3';
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(outX, outY);
                ctx.stroke();
                
                drawArrow(sourceX, sourceY, centerX, centerY, '#f44336');
                drawArrow(centerX, centerY, outX, outY, '#2196f3');
            }

            if (mode === 'wave' || mode === 'both') {
                time += speed * 0.15; 
                const waveLength = 300 / freq; 
                const spread = 0.15; 
                
                const virtualX = sourceX;
                const virtualY = centerY + (centerY - sourceY); 
                
                const angleS = Math.atan2(centerY - sourceY, centerX - sourceX);
                const angleV = Math.atan2(centerY - virtualY, centerX - virtualX);

                let offset = time % waveLength;
                
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, 0, width, centerY);
                ctx.clip();
                
                for (let r = offset; r < rayLen * 2.5; r += waveLength) {
                    ctx.beginPath();
                    ctx.arc(sourceX, sourceY, r, angleS - spread, angleS + spread);
                    ctx.strokeStyle = 'rgba(244, 67, 54, 0.9)';
                    ctx.lineWidth = 3.5;
                    ctx.lineCap = 'round';
                    ctx.stroke();

                    if (r > (centerY - sourceY)) {
                        ctx.beginPath();
                        ctx.arc(virtualX, virtualY, r, angleV - spread, angleV + spread);
                        ctx.strokeStyle = 'rgba(33, 150, 243, 0.9)';
                        ctx.lineWidth = 3.5;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }
                }
                ctx.restore(); 
            }

            ctx.font = '600 15px Pretendard';
            ctx.textAlign = 'center';
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 70, -Math.PI/2, -Math.PI/2 - rad, true);
            ctx.strokeStyle = '#f44336';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#f44336';
            ctx.fillText(`입사각 ${angle}°`, centerX - 65, centerY - 85);

            ctx.beginPath();
            ctx.arc(centerX, centerY, 70, -Math.PI/2, -Math.PI/2 + rad, false);
            ctx.strokeStyle = '#2196f3';
            ctx.stroke();
            ctx.fillStyle = '#2196f3';
            ctx.fillText(`반사각 ${angle}°`, centerX + 65, centerY - 85);

            requestAnimationFrame(draw);
        }

        function drawArrow(x1, y1, x2, y2, color) {
            const headlen = 16;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.fillStyle = color;
            ctx.beginPath();
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;
            ctx.moveTo(midX, midY);
            ctx.lineTo(midX - headlen * Math.cos(angle - Math.PI/7), midY - headlen * Math.sin(angle - Math.PI/7));
            ctx.lineTo(midX - headlen * Math.cos(angle + Math.PI/7), midY - headlen * Math.sin(angle + Math.PI/7));
            ctx.fill();
        }

        draw();
    }

    // ===================================================
    // 시뮬레이션 2 JS (변수 충돌 방지를 위해 함수로 감쌈)
    // ===================================================
    function initSim2() {
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        const waveSlider = document.getElementById('waveSlider');
        const speedSlider = document.getElementById('speedSlider2');
        const maskWidthSlider = document.getElementById('maskWidthSlider');
        const modeBtns = document.querySelectorAll('#sim2-wrapper .btn');

        let mode = 'all'; 
        let time = 0;

        const sourceHistory = new Array(100).fill(0);
        const destHistory = new Array(100).fill(0);

        function resize() {
            if(currentTab !== 2) return;
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize);
        resize();

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                mode = btn.dataset.mode;
            });
        });

        function drawRealtimeGraph(x, y, w, h, data, title, range = 2.5) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w, y); ctx.stroke(); 

            ctx.setLineDash([2, 4]);
            ctx.beginPath(); ctx.moveTo(x, y - h/2); ctx.lineTo(x + w, y - h/2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y + h/2); ctx.lineTo(x + w, y + h/2); ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#ccc'; ctx.font = '13px Pretendard'; ctx.textAlign = 'center';
            ctx.fillText(title, x + w/2, y + h/2 + 25);

            for(let i = 0; i < data.length - 1; i++) {
                let px1 = x + w - i * (w / 100);
                let py1 = y - (data[i] / range) * (h / 2); 
                let px2 = x + w - (i + 1) * (w / 100);
                let py2 = y - (data[i+1] / range) * (h / 2);
                
                ctx.beginPath();
                ctx.moveTo(px1, py1);
                ctx.lineTo(px2, py2);
                ctx.strokeStyle = data[i] > 0 ? 'rgba(255, 80, 80, 0.9)' : 'rgba(80, 150, 255, 0.9)';
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }

            let current = data[0];
            ctx.fillStyle = current > 0 ? 'rgba(255, 80, 80, 0.8)' : 'rgba(80, 150, 255, 0.8)';
            ctx.fillRect(x + w, y, 6, -(current / range) * (h / 2));
        }

        function draw() {
            if(currentTab !== 2) { requestAnimationFrame(draw); return; }

            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;
            
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            const lambda = parseInt(waveSlider.value);
            const speed = parseInt(speedSlider.value) * 0.03; 
            const maskWidth = parseInt(maskWidthSlider.value);
            time += speed;

            const startX = width * 0.25;
            const startY = 160; 
            const endX = width * 0.75;
            const endY = 160;
            const mirrorY = height - 50; 
            const mirrorCenterX = (startX + endX) / 2;

            let denseAmpSum = 0;
            const k = Math.PI * 2 / lambda;
            
            for (let mx = 60; mx <= width - 60; mx += 2) {
                let isBlocked = false;
                if (mode === 'center_only') {
                    if (mx < mirrorCenterX - maskWidth/2 || mx > mirrorCenterX + maskWidth/2) isBlocked = true;
                } else if (mode === 'edges_only') {
                    if (mx >= mirrorCenterX - maskWidth/2 && mx <= mirrorCenterX + maskWidth/2) isBlocked = true;
                }

                if (!isBlocked) {
                    const totalD = Math.hypot(mx - startX, mirrorY - startY) + Math.hypot(endX - mx, endY - mirrorY);
                    denseAmpSum += Math.cos(k * totalD - time);
                }
            }

            let averageAmp = denseAmpSum / 40; 
            if (mode === 'center_only') averageAmp *= 1.2; 

            ctx.save();
            ctx.globalCompositeOperation = 'lighter'; 

            const pathsCount = 13; 
            const step = (width - 120) / (pathsCount - 1);
            const waveAmp = 5; 

            for (let mx = 60; mx <= width - 60; mx += step) {
                let isBlocked = false;
                if (mode === 'center_only') {
                    if (mx < mirrorCenterX - maskWidth/2 || mx > mirrorCenterX + maskWidth/2) isBlocked = true;
                } else if (mode === 'edges_only') {
                    if (mx >= mirrorCenterX - maskWidth/2 && mx <= mirrorCenterX + maskWidth/2) isBlocked = true;
                }

                if (!isBlocked) {
                    const d1 = Math.hypot(mx - startX, mirrorY - startY);
                    const d2 = Math.hypot(endX - mx, endY - mirrorY);
                    const totalD = d1 + d2;
                    
                    const lineStep = 3; 
                    let lastSign = 0;
                    ctx.lineWidth = 2.5;

                    for (let d = 0; d <= totalD; d += lineStep) {
                        let baseX, baseY, angle;
                        
                        if (d <= d1) {
                            const ratio = d / d1;
                            baseX = startX + (mx - startX) * ratio;
                            baseY = startY + (mirrorY - startY) * ratio;
                            angle = Math.atan2(mirrorY - startY, mx - startX);
                        } else {
                            const ratio = (d - d1) / d2;
                            baseX = mx + (endX - mx) * ratio;
                            baseY = mirrorY + (endY - mirrorY) * ratio;
                            angle = Math.atan2(endY - mirrorY, endX - mx);
                        }

                        const val = Math.cos(k * d - time);
                        const perpX = Math.cos(angle - Math.PI/2);
                        const perpY = Math.sin(angle - Math.PI/2);
                        
                        const drawX = baseX + perpX * val * waveAmp;
                        const drawY = baseY + perpY * val * waveAmp;

                        const sign = val >= 0 ? 1 : -1;

                        if (sign !== lastSign || d === 0) {
                            if (d > 0) ctx.stroke();
                            ctx.beginPath();
                            ctx.strokeStyle = sign === 1 ? 'rgba(255, 60, 60, 0.4)' : 'rgba(60, 150, 255, 0.4)';
                            
                            if (d > 0) {
                                const prevD = d - lineStep;
                                let pBaseX, pBaseY, pAngle;
                                if (prevD <= d1) {
                                    pBaseX = startX + (mx - startX) * (prevD / d1);
                                    pBaseY = startY + (mirrorY - startY) * (prevD / d1);
                                    pAngle = Math.atan2(mirrorY - startY, mx - startX);
                                } else {
                                    pBaseX = mx + (endX - mx) * ((prevD - d1) / d2);
                                    pBaseY = mirrorY + (endY - mirrorY) * ((prevD - d1) / d2);
                                    pAngle = Math.atan2(endY - mirrorY, endX - mx);
                                }
                                const pVal = Math.cos(k * prevD - time);
                                const pPerpX = Math.cos(pAngle - Math.PI/2);
                                const pPerpY = Math.sin(pAngle - Math.PI/2);
                                ctx.moveTo(pBaseX + pPerpX * pVal * waveAmp, pBaseY + pPerpY * pVal * waveAmp);
                            } else {
                                ctx.moveTo(drawX, drawY);
                            }
                            lastSign = sign;
                        }
                        ctx.lineTo(drawX, drawY);
                    }
                    ctx.stroke(); 
                }
            }
            ctx.restore();
            
            const sourceVal = Math.cos(-time); 
            sourceHistory.unshift(sourceVal);
            if(sourceHistory.length > 100) sourceHistory.pop();

            destHistory.unshift(averageAmp);
            if(destHistory.length > 100) destHistory.pop();

            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            for (let mx = 60; mx <= width - 60; mx += 2) {
                let isBlocked = false;
                if (mode === 'center_only' && (mx < mirrorCenterX - maskWidth/2 || mx > mirrorCenterX + maskWidth/2)) isBlocked = true;
                if (mode === 'edges_only' && (mx >= mirrorCenterX - maskWidth/2 && mx <= mirrorCenterX + maskWidth/2)) isBlocked = true;
                ctx.fillStyle = isBlocked ? '#1a1a1a' : '#777'; 
                ctx.fillRect(mx, mirrorY, 2, 10);
            }
            ctx.fillStyle = '#aaa'; ctx.textAlign = 'center'; ctx.font = '14px Pretendard';
            ctx.fillText('거울 표면', mirrorCenterX, mirrorY + 32);

            const sColor = sourceVal >= 0 ? `rgba(255, 80, 80, ${0.5 + Math.abs(sourceVal)*0.5})` : `rgba(80, 150, 255, ${0.5 + Math.abs(sourceVal)*0.5})`;
            ctx.fillStyle = sColor;
            ctx.beginPath(); ctx.arc(startX, startY, 8 + Math.abs(sourceVal)*5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(startX, startY, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillText('광원(A)', startX, startY - 25);

            const intensity = Math.abs(averageAmp); 
            const visualGlow = Math.min(1.0, intensity / 1.5);
            let endColor = averageAmp > 0 ? `rgba(255, 80, 80, ${0.3 + visualGlow})` : `rgba(80, 150, 255, ${0.3 + visualGlow})`;
            let glowRadius = 8 + visualGlow * 30;

            ctx.fillStyle = endColor;
            ctx.beginPath(); ctx.arc(endX, endY, glowRadius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(endX, endY, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillText('목적지(B)', endX, endY - 25);

            const graphWidth = 140;
            const graphHeight = 100; 
            
            drawRealtimeGraph(startX - graphWidth - 30, startY, graphWidth, graphHeight, sourceHistory, '출발하는 파동 (진폭 1)', 1.5);
            drawRealtimeGraph(endX + 30, endY, graphWidth, graphHeight, destHistory, '도착한 파동 합계', 2.5);

            requestAnimationFrame(draw);
        }

        draw();
    }

    // ---------------------------------------------------
    // 페이지 로드 시 시뮬레이션 개별 초기화
    // ---------------------------------------------------
    initSim1();
    initSim2();
</script>
